<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pin Lab Co. - Catálogo</title>
  <link rel="icon" type="image/png" href="imagenes/favicon.png" />
  <style>
    :root{
      --azul:#2f78bd;
      --azul-oscuro:#244f82;
      --azul-suave:#eaf2fb;
      --texto:#1f1f1f;
      --muted:#6d6d6d;
      --bg:#f6f3ee;
      --card:rgba(255,255,255,.97);
      --line:#e8e8e8;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      --shadow-soft:0 8px 18px rgba(0,0,0,.05);
      --radius:20px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(47,120,189,.06), transparent 28%),
        linear-gradient(to bottom, #f7f4ef 0%, #f6f3ee 100%);
      color:var(--texto);
    }

    .container{
      width:min(100%, 1400px);
      margin:0 auto;
      padding:0 18px 30px;
    }

    .top-strip{
      background:linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      color:#fff;
      text-align:center;
      font-weight:700;
      font-size:13px;
      line-height:1.4;
      padding:12px 14px;
      letter-spacing:.2px;
    }

    header{
      background:rgba(255,255,255,.96);
      backdrop-filter: blur(6px);
      box-shadow:var(--shadow-soft);
      border-bottom:1px solid rgba(0,0,0,.03);
      position:static;
    }

    .navbar{
      width:min(100%, 1400px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
      padding:18px;
    }

    .nav-top{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .nav-left{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .logo-box{
      width:200px;
      height:200px;
      border:none;
      border-radius:20px;
      background:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex-shrink:0;
    }

    .logo-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .brand{
      display:none;
    }

    .menu-toggle{
      display:none;
    }

    .menu-btn{
      display:none;
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:#f2f2f2;
      font-size:24px;
      cursor:pointer;
      flex-shrink:0;
      align-items:center;
      justify-content:center;
      user-select:none;
    }

    .nav-bottom{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:22px;
      padding-top:4px;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:30px;
      flex-wrap:wrap;
      width:100%;
    }

    .main-nav a{
      text-decoration:none;
      color:#24303f;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
      padding:10px 0;
      transition:.2s ease;
      position:relative;
      white-space:nowrap;
    }

    .main-nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:4px;
      width:0;
      height:3px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      transition:width .22s ease;
    }

    .main-nav a:hover{
      color:var(--azul);
    }

    .main-nav a:hover::after{
      width:100%;
    }

    .toolbar{
      display:grid;
      grid-template-columns:minmax(280px, 360px) 220px;
      gap:12px;
      align-items:center;
    }

    .toolbar input,
    .toolbar select{
      width:100%;
      border:1px solid var(--line);
      border-radius:15px;
      padding:13px 16px;
      background:#fff;
      font-size:14px;
      outline:none;
      transition:.2s ease;
      box-shadow:0 2px 6px rgba(0,0,0,.02);
      color:#333;
    }

    .toolbar input:focus,
    .toolbar select:focus{
      border-color:rgba(47,120,189,.45);
      box-shadow:0 0 0 4px rgba(47,120,189,.08);
    }

    .filter-panel-wrap{
      display:block;
      width:100%;
      margin-top:0;
      margin-bottom:16px;
      overflow:hidden;
      transition:max-height .28s ease, opacity .22s ease, transform .22s ease, margin .22s ease;
      max-height:220px;
      opacity:1;
      transform:translateY(0);
    }

    .filter-panel-wrap.hidden{
      max-height:0;
      opacity:0;
      transform:translateY(-8px);
      margin-top:0;
      margin-bottom:0;
      pointer-events:none;
    }

    .filter-panel{
      background:rgba(255,255,255,.84);
      border:1px solid rgba(0,0,0,.04);
      border-radius:20px;
      padding:12px;
      box-shadow:var(--shadow-soft);
      backdrop-filter: blur(6px);
    }

    .filter-panel-wrap .toolbar{
      grid-template-columns:minmax(280px, 360px) 220px;
      justify-content:flex-start;
    }

    .banner{
      margin-top:22px;
      padding:38px 28px;
      background:linear-gradient(135deg, #557396, #2f78bd);
      color:#fff;
      border-radius:30px;
      text-align:center;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .banner::before{
      content:"";
      position:absolute;
      top:-70px;
      left:-70px;
      width:200px;
      height:200px;
      border-radius:50%;
      background:rgba(255,255,255,.06);
    }

    .banner::after{
      content:"";
      position:absolute;
      inset:auto -60px -60px auto;
      width:190px;
      height:190px;
      background:rgba(255,255,255,.08);
      border-radius:50%;
      filter:blur(2px);
    }

    .banner h2{
      font-size:44px;
      margin-bottom:10px;
      position:relative;
      z-index:1;
      font-weight:800;
    }

    .banner p{
      max-width:820px;
      margin:0 auto;
      line-height:1.55;
      font-size:16px;
      color:rgba(255,255,255,.92);
      position:relative;
      z-index:1;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin:28px 0 16px;
    }

    .section-head h3{
      font-size:44px;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-.8px;
    }

    .section-tools{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
    }

    .filter-trigger{
      display:flex;
      align-items:center;
      gap:10px;
      border:none;
      background:transparent;
      padding:0;
      font-size:15px;
      color:#4b4b4b;
      cursor:pointer;
      font-weight:700;
    }

    .filter-trigger svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      flex-shrink:0;
    }

    .filter-trigger span{
      white-space:nowrap;
    }

    .product-counter{
      color:var(--muted);
      font-size:16px;
      margin-left:auto;
      white-space:nowrap;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:24px;
    }

    .product-card{
      background:var(--card);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      transition:.2s ease;
      min-height:100%;
      border:1px solid rgba(0,0,0,.03);
    }

    .product-card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 30px rgba(0,0,0,.11);
    }

    .image-area{
      position:relative;
      aspect-ratio:1/1;
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(239,235,228,.98)),
        url("imagenes/textura.jpg") center/cover no-repeat;
      overflow:hidden;
    }

    .tag{
      position:absolute;
      top:12px;
      left:12px;
      color:#fff;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      z-index:2;
      box-shadow:0 6px 12px rgba(0,0,0,.12);
    }

    .tag.disponible{
      background:rgba(17,17,17,.85);
    }

    .tag.agotado{
      background:#c0392b;
    }

    .image-area img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#eee;
      transition:transform .25s ease;
    }

    .product-card:hover .image-area img{
      transform:scale(1.02);
    }

    .image-placeholder{
      width:calc(100% - 20px);
      height:calc(100% - 20px);
      margin:10px;
      border-radius:16px;
      border:2px dashed rgba(0,0,0,.12);
      background:rgba(255,255,255,.35);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px;
    }

    .image-placeholder .icon{
      font-size:28px;
      margin-bottom:8px;
    }

    .image-placeholder p{
      color:#666;
      font-size:12px;
      line-height:1.4;
    }

    .product-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:9px;
      flex-grow:1;
    }

    .product-title{
      font-size:19px;
      font-weight:800;
      line-height:1.25;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:48px;
    }

    .product-ref{
      color:var(--muted);
      font-size:14px;
    }

    .product-price{
      font-size:27px;
      font-weight:800;
      line-height:1;
      color:#1e2a36;
    }

    .product-desc{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:62px;
    }

    .product-actions{
      margin-top:auto;
      display:grid;
      gap:8px;
      padding-top:6px;
    }

    .btn-product{
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:13px 14px;
      border-radius:14px;
      font-weight:800;
      font-size:14px;
      transition:.2s ease;
    }

    .btn-whatsapp{
      background:#25D366;
      color:#fff;
      box-shadow:0 8px 16px rgba(37,211,102,.18);
    }

    .btn-whatsapp:hover{
      background:#1eb95a;
      transform:translateY(-1px);
    }

    .btn-whatsapp.disabled{
      background:#bdbdbd;
      pointer-events:none;
      cursor:not-allowed;
      box-shadow:none;
    }

    .load-more-wrap{
      display:flex;
      justify-content:center;
      margin-top:24px;
    }

    .load-more-btn{
      border:none;
      background:linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      color:#fff;
      padding:15px 24px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      transition:.2s ease;
    }

    .load-more-btn:hover{
      transform:translateY(-2px);
      opacity:.96;
    }

    .load-more-btn.hidden{
      display:none;
    }

    footer{
      margin-top:30px;
      background:rgba(255,255,255,.92);
      border-radius:18px;
      padding:20px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow-soft);
      font-size:13px;
      line-height:1.5;
      border:1px solid rgba(0,0,0,.03);
    }

    @media (max-width: 1199px){
      .filter-panel-wrap .toolbar{
        grid-template-columns:minmax(220px, 300px) 200px;
      }

      .products-grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:20px;
      }

      .banner h2{
        font-size:38px;
      }

      .section-head h3{
        font-size:38px;
      }
    }

    @media (max-width: 991px){
      .container{
        padding:0 16px 28px;
      }

      .navbar{
        gap:14px;
        padding:16px;
      }

      .nav-top{
        align-items:center;
        justify-content:center;
      }

      .logo-box{
        width:130px;
        height:130px;
      }

      .nav-bottom{
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
      }

      .main-nav{
        width:100%;
        justify-content:flex-start;
        gap:22px;
      }

      .filter-panel-wrap .toolbar{
        width:100%;
        grid-template-columns:1fr 200px;
      }

      .products-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:18px;
      }

      .banner{
        padding:32px 22px;
      }

      .banner h2{
        font-size:34px;
      }

      .banner p{
        font-size:15px;
      }

      .section-head h3{
        font-size:34px;
      }
    }

    @media (max-width: 640px){
      .top-strip{
        font-size:11px;
        line-height:1.35;
        padding:10px 12px;
      }

      header{
        position:relative;
      }

      .navbar{
        gap:8px;
        padding:10px 14px 12px;
      }

      .nav-top{
        position:relative;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:90px;
        padding:0;
      }

      .nav-left{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
      }

      .brand{
        display:none;
      }

      .logo-box{
        width:180px;
        height:180px;
        margin:0 auto;
      }

      .logo-box img{
        width:100%;
        height:100%;
        object-fit:contain;
      }

      .menu-btn{
        display:flex;
        position:absolute;
        left:0;
        top:50%;
        transform:translateY(-50%);
        width:42px;
        height:42px;
        border:none;
        border-radius:14px;
        background:transparent;
        font-size:34px;
        cursor:pointer;
        align-items:center;
        justify-content:center;
        z-index:3;
        color:#222;
        padding:0;
      }

      .nav-bottom{
        display:flex;
        flex-direction:column;
        gap:12px;
      }

      .main-nav{
        display:none;
        flex-direction:column;
        align-items:flex-start;
        gap:6px;
        background:#fff;
        border:1px solid var(--line);
        border-radius:16px;
        padding:12px 14px;
        box-shadow:var(--shadow-soft);
      }

      .main-nav a{
        width:100%;
        font-size:14px;
        padding:8px 0;
      }

      .main-nav a::after{
        display:none;
      }

      .menu-toggle:checked ~ .nav-bottom .main-nav{
        display:flex;
      }

      .banner{
        display:none;
      }

      .section-head{
        margin:14px 0 10px;
        display:flex;
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
      }

      .section-head h3{
        width:100%;
        font-size:38px;
        line-height:1;
        font-weight:800;
        letter-spacing:-0.8px;
      }

      .section-tools{
        display:flex;
        align-items:center;
        justify-content:space-between;
        width:100%;
        gap:12px;
      }

      .filter-trigger{
        display:flex;
        align-items:center;
        justify-content:flex-start;
        gap:8px;
        font-size:14px;
        color:#4d4d4d;
        flex:1;
      }

      .filter-trigger svg{
        width:18px;
        height:18px;
      }

      .product-counter{
        font-size:13px;
        color:#777;
        margin-left:auto;
        white-space:nowrap;
        flex-shrink:0;
      }

      .filter-panel-wrap{
        display:block;
        width:100%;
        margin-top:0;
        margin-bottom:16px;
        overflow:hidden;
        transition:max-height .28s ease, opacity .22s ease, transform .22s ease, margin .22s ease;
        max-height:220px;
        opacity:1;
        transform:translateY(0);
      }

      .filter-panel-wrap.hidden{
        max-height:0;
        opacity:0;
        transform:translateY(-8px);
        margin-top:0;
        margin-bottom:0;
        pointer-events:none;
      }

      .filter-panel{
        width:100%;
        padding:12px;
      }

      .filter-panel-wrap .toolbar{
        grid-template-columns:1fr;
        gap:10px;
      }

      .filter-panel-wrap .toolbar input,
      .filter-panel-wrap .toolbar select{
        width:100%;
        padding:13px 14px;
        font-size:14px;
        border-radius:16px;
      }

      .products-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:12px;
      }

      .product-body{
        padding:12px;
      }

      .product-title{
        font-size:15px;
        min-height:38px;
      }

      .product-ref{
        font-size:12px;
      }

      .product-price{
        font-size:20px;
      }

      .product-desc{
        font-size:12px;
        min-height:52px;
      }

      .btn-product{
        font-size:12px;
        padding:11px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="top-strip">
    COMPRAS A PARTIR DE 3 UNIDADES · PUEDEN SER SURTIDAS · PÍDENOS POR WHATSAPP
  </div>

  <header>
    <div class="navbar">
      <div class="nav-top">
        <label for="menu-toggle" class="menu-btn">☰</label>

        <div class="nav-left">
          <div class="logo-box">
            <img src="imagenes/logo.png" alt="Logo tu PIN" onerror="this.style.display='none'; this.parentElement.innerHTML='Logo';">
          </div>
        </div>
      </div>

      <input type="checkbox" id="menu-toggle" class="menu-toggle">

      <div class="nav-bottom">
        <nav class="main-nav">
          <a href="index.html">INICIO</a>
          <a href="catalogo.html">CATÁLOGO</a>
          <a href="preguntas.html">PREGUNTAS FRECUENTES</a>
          <a href="contacto.html">CONTACTO</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="container">
    <section class="banner">
      <h2>Catálogo de pines</h2>
      <p>Explora nuestras referencias y haz tu pedido directo por WhatsApp de forma rápida y fácil.</p>
    </section>

    <section class="section-head">
      <h3>Productos</h3>

      <div class="section-tools">
        <button type="button" class="filter-trigger" id="filterTrigger" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <circle cx="9" cy="6" r="2"></circle>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <circle cx="15" cy="12" r="2"></circle>
            <line x1="4" y1="18" x2="20" y2="18"></line>
            <circle cx="11" cy="18" r="2"></circle>
          </svg>
          <span>Buscar y ordenar</span>
        </button>

        <p class="product-counter">
          <span id="productCount">0</span> productos
        </p>
      </div>
    </section>

    <div class="filter-panel-wrap hidden" id="filterPanelWrap">
      <div class="filter-panel">
        <div class="toolbar">
          <input type="text" id="searchInputPanel" placeholder="Buscar pin..." />
          <select id="sortSelectPanel">
            <option value="default">Ordenar por</option>
            <option value="name">Nombre A-Z</option>
            <option value="low">Precio menor a mayor</option>
            <option value="high">Precio mayor a menor</option>
          </select>
        </div>
      </div>
    </div>

    <section class="products-grid" id="productGrid"></section>

    <div class="load-more-wrap">
      <button id="loadMoreBtn" class="load-more-btn">Ver más pines</button>
    </div>

    <footer>
      © 2026 Pin Lab Co. · Cali, Colombia
    </footer>
  </div>

  <script>
    const searchInputPanel = document.getElementById('searchInputPanel');
    const sortSelectPanel = document.getElementById('sortSelectPanel');
    const productGrid = document.getElementById('productGrid');
    const productCount = document.getElementById('productCount');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const filterTrigger = document.getElementById('filterTrigger');
    const filterPanelWrap = document.getElementById('filterPanelWrap');

    const whatsappNumber = '573116821619';

    const productos = [

      { id: 1, foto: 'imagenes/pin1.jpeg', nombre: 'Pin Chef Ratatouille', referencia: '001', precio: 8000, descripcion: 'Ratoncito chef con estilo culinario.', estado: 'agotado' },
      { id: 2, foto: 'imagenes/pin2.jpeg', nombre: 'Pin Gatos Mágicos', referencia: '002', precio: 8000, descripcion: 'Gatitos curiosos en un mundo encantado.', estado: 'disponible' },
      { id: 3, foto: 'imagenes/pin3.jpeg', nombre: 'Pin Totoro Clásico', referencia: '003', precio: 8000, descripcion: 'Espíritu del bosque en versión minimalista.', estado: 'disponible' },
      { id: 4, foto: 'imagenes/pin4.jpeg', nombre: 'Pin Totoro Floral', referencia: '004', precio: 8000, descripcion: 'Totoro rodeado de flores delicadas.', estado: 'disponible' },

    const INITIAL_VISIBLE = 8;
    const LOAD_MORE_STEP = 8;
    let visibleCount = INITIAL_VISIBLE;
    let filteredProducts = [...productos];

    function getActiveSearchInput() {
      return searchInputPanel;
    }

    function getActiveSortSelect() {
      return sortSelectPanel;
    }

    function formatoCOP(valor) {
      return '$' + valor.toLocaleString('es-CO') + ' COP';
    }

    function crearImagen(producto) {
      return `
        <img
          src="${producto.foto}"
          alt="${producto.nombre} ${producto.referencia}"
          width="400"
          height="400"
          onerror="this.outerHTML=\`
            <div class='image-placeholder'>
              <div class='icon'>📌</div>
              <p>Aquí irá la imagen de tu pin</p>
            </div>
          \`"
        />
      `;
    }

    function crearTarjeta(producto) {
      const disponible = producto.estado === 'disponible';
      const mensaje = encodeURIComponent(
        `Hola, quiero información sobre ${producto.nombre} Ref ${producto.referencia}`
      );

      return `
        <article class="product-card">
          <div class="image-area">
            <span class="tag ${disponible ? 'disponible' : 'agotado'}">
              ${disponible ? 'Disponible' : 'Agotado'}
            </span>
            ${crearImagen(producto)}
          </div>

          <div class="product-body">
            <h4 class="product-title">${producto.nombre}</h4>
            <p class="product-ref">Ref: ${producto.referencia}</p>
            <div class="product-price">${formatoCOP(producto.precio)}</div>
            <p class="product-desc">${producto.descripcion}</p>

            <div class="product-actions">
              <a
                class="btn-product btn-whatsapp ${disponible ? '' : 'disabled'}"
                href="${disponible ? `https://wa.me/${whatsappNumber}?text=${mensaje}` : '#'}"
                target="_blank"
              >
                ${disponible ? 'Pedir por WhatsApp' : 'No disponible'}
              </a>
            </div>
          </div>
        </article>
      `;
    }

    function actualizarBotonVerMas() {
      if (visibleCount >= filteredProducts.length) {
        loadMoreBtn.classList.add('hidden');
      } else {
        loadMoreBtn.classList.remove('hidden');
      }
    }

    function renderProductos(lista) {
      filteredProducts = lista;
      const visibles = filteredProducts.slice(0, visibleCount);
      productGrid.innerHTML = visibles.map(crearTarjeta).join('');
      productCount.textContent = filteredProducts.length;
      actualizarBotonVerMas();
    }

    function aplicarFiltros(resetVisible = true) {
      const termino = getActiveSearchInput().value.toLowerCase().trim();
      const orden = getActiveSortSelect().value;

      let filtrados = productos.filter(p =>
        `${p.nombre} ${p.referencia}`.toLowerCase().includes(termino)
      );

      if (orden === 'name') {
        filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));
      } else if (orden === 'low') {
        filtrados.sort((a, b) => a.precio - b.precio);
      } else if (orden === 'high') {
        filtrados.sort((a, b) => b.precio - a.precio);
      }

      if (resetVisible) {
        visibleCount = INITIAL_VISIBLE;
      }

      renderProductos(filtrados);
    }

    function setFilterPanelState(show) {
      if (!filterPanelWrap || !filterTrigger) return;
      filterPanelWrap.classList.toggle('hidden', !show);
      filterTrigger.setAttribute('aria-expanded', show ? 'true' : 'false');
    }

    loadMoreBtn.addEventListener('click', () => {
      visibleCount += LOAD_MORE_STEP;
      renderProductos(filteredProducts);
    });

    searchInputPanel.addEventListener('input', () => {
      aplicarFiltros(true);
    });

    sortSelectPanel.addEventListener('change', () => {
      aplicarFiltros(true);
    });

    if (filterTrigger && filterPanelWrap) {
      filterTrigger.addEventListener('click', () => {
        const isHidden = filterPanelWrap.classList.contains('hidden');
        setFilterPanelState(isHidden);
      });
    }

    window.addEventListener('resize', () => {
      aplicarFiltros(false);
    });

    setFilterPanelState(false);
    aplicarFiltros(true);
  </script>
