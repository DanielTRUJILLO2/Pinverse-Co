<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pin Lab Co. - Catálogo</title>
  <link rel="icon" type="image/png" href="../imagenes/favicon.png" />
  <style>
    :root{
      --azul:#2f78bd;
      --azul-oscuro:#244f82;
      --azul-medio:#3f8ad1;
      --azul-claro:#eaf3ff;
      --texto:#1f1f1f;
      --texto-fuerte:#223247;
      --muted:#6d6d6d;
      --muted-2:#718096;
      --bg:#f6f3ee;
      --card:rgba(255,255,255,.88);
      --line:#e8e8e8;
      --line-blue:rgba(36,79,130,.10);
      --shadow:0 18px 40px rgba(22,34,57,.10);
      --shadow-soft:0 10px 24px rgba(21,35,60,.06);
      --shadow-card:0 16px 30px rgba(24,39,75,.08);
      --verde:#1f7a5a;
      --verde-oscuro:#166247;
      --negro-suave:#24272c;
      --gris-oscuro:#343942;
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(circle at 12% 8%, rgba(47,120,189,.10), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(47,120,189,.08), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(36,79,130,.06), transparent 28%),
        linear-gradient(180deg, #f8f7f3 0%, #f4f1eb 54%, #f2eee8 100%);
      color:var(--texto);
      overflow-x:hidden;
    }

    .container{
      width:min(100%, 1400px);
      margin:0 auto;
      padding:0 18px 36px;
    }

    header{
      background:rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      box-shadow:0 10px 24px rgba(20,35,60,.06);
      border-bottom:1px solid rgba(36,79,130,.08);
      position:relative;
      z-index:30;
    }

    .navbar{
      width:min(100%, 1400px);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:28px;
      padding:14px 24px;
      min-height:110px;
      position:relative;
    }

    .nav-left{
      display:flex;
      align-items:center;
      gap:26px;
      min-width:0;
      flex:1;
    }

    .logo-box{
      width:112px;
      height:112px;
      border:none;
      background:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex-shrink:0;
      text-decoration:none;
    }

    .logo-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.06));
      transition:transform .2s ease;
    }

    .logo-box:hover img,
    .mobile-drawer-logo-link:hover img{
      transform:scale(1.05);
      cursor:pointer;
    }

    .menu-toggle{
      display:none;
    }

    .menu-btn{
      display:none;
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:#f2f2f2;
      font-size:24px;
      cursor:pointer;
      align-items:center;
      justify-content:center;
      user-select:none;
      flex-shrink:0;
    }

    .nav-bottom{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      flex:1;
      min-width:0;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:34px;
      flex-wrap:wrap;
      width:100%;
    }

    .main-nav a{
      text-decoration:none;
      color:var(--texto-fuerte);
      font-size:15px;
      font-weight:800;
      letter-spacing:.45px;
      padding:8px 0;
      transition:.25s ease;
      position:relative;
      white-space:nowrap;
    }

    .main-nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:2px;
      width:0;
      height:3px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      transition:width .22s ease;
    }

    .main-nav a:hover{
      color:var(--azul);
    }

    .main-nav a:hover::after{
      width:100%;
    }

    .mobile-overlay{
      display:none;
    }

    .mobile-drawer{
      display:none;
    }

    .mobile-close{
      display:none;
    }

    .mobile-drawer-logo-link{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .catalog-hero{
      margin-top:0;
      min-height:330px;
      background:
        linear-gradient(90deg, rgba(16,24,38,.62) 0%, rgba(16,24,38,.38) 40%, rgba(16,24,38,.22) 100%),
        linear-gradient(180deg, rgba(16,24,38,.18) 0%, rgba(16,24,38,.42) 100%),
        url("../imagenes/banner-imagen-catalogo.jpg") center/cover no-repeat;
      color:#fff;
      width:100vw;
      margin-left:calc(50% - 50vw);
      margin-right:calc(50% - 50vw);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .catalog-hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.10), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.08), transparent 24%);
      pointer-events:none;
    }

    .catalog-hero-inner{
      max-width:980px;
      margin:0 auto;
      position:relative;
      z-index:1;
      padding:44px 20px;
    }

    .catalog-pill{
      display:inline-block;
      padding:9px 15px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.16);
      font-size:13px;
      font-weight:800;
      margin-bottom:18px;
      text-transform:uppercase;
      letter-spacing:.7px;
    }

    .catalog-hero h1{
      font-size:54px;
      line-height:1;
      margin-bottom:12px;
      letter-spacing:-1.4px;
      text-shadow:0 10px 24px rgba(0,0,0,.20);
    }

    .catalog-hero p{
      font-size:18px;
      line-height:1.65;
      max-width:780px;
      margin:0 auto;
      color:rgba(255,255,255,.94);
      text-shadow:0 4px 14px rgba(0,0,0,.14);
    }

    .section-shell{
      background:rgba(255,255,255,.84);
      box-shadow:var(--shadow-soft);
      border:1px solid rgba(36,79,130,.08);
      backdrop-filter: blur(8px);
      position:relative;
      overflow:hidden;
      border-radius:0;
      width:100vw;
      margin-left:calc(50% - 50vw);
      margin-right:calc(50% - 50vw);
      padding:30px 42px 36px;
    }

    .section-shell::before{
      content:"";
      position:absolute;
      top:-60px;
      right:-60px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(47,120,189,.10), transparent 68%);
      pointer-events:none;
    }

    .section-head{
      display:flex;
      flex-direction:column;
      gap:16px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .section-head-top{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:16px;
    }

    .section-head h2{
      font-size:40px;
      line-height:1.02;
      letter-spacing:-1px;
      color:#1d2d40;
    }

    .product-counter{
      color:var(--muted);
      font-size:15px;
      white-space:nowrap;
      align-self:center;
    }

    .section-tools{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-start;
      flex-wrap:wrap;
    }

    .filter-trigger{
      display:inline-flex;
      align-items:center;
      gap:10px;
      border:none;
      background:transparent;
      padding:0;
      font-size:15px;
      color:#4b4b4b;
      cursor:pointer;
      font-weight:800;
    }

    .filter-trigger svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      flex-shrink:0;
    }

    .filter-panel-wrap{
      display:block;
      width:100%;
      margin-top:0;
      margin-bottom:18px;
      overflow:hidden;
      transition:max-height .28s ease, opacity .22s ease, transform .22s ease, margin .22s ease;
      max-height:220px;
      opacity:1;
      transform:translateY(0);
      position:relative;
      z-index:1;
    }

    .filter-panel-wrap.hidden{
      max-height:0;
      opacity:0;
      transform:translateY(-8px);
      margin-top:0;
      margin-bottom:0;
      pointer-events:none;
    }

    .filter-panel{
      background:rgba(255,255,255,.97);
      border:1px solid rgba(36,79,130,.08);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow-card);
      backdrop-filter: blur(6px);
    }

    .toolbar{
      display:grid;
      grid-template-columns:minmax(280px, 420px) 220px;
      gap:12px;
      align-items:center;
      justify-content:flex-start;
    }

    .toolbar input,
    .toolbar select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      background:#fff;
      font-size:14px;
      outline:none;
      transition:.2s ease;
      box-shadow:0 2px 6px rgba(0,0,0,.02);
      color:#333;
    }

    .toolbar input:focus,
    .toolbar select:focus{
      border-color:rgba(47,120,189,.45);
      box-shadow:0 0 0 4px rgba(47,120,189,.08);
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:24px;
      position:relative;
      z-index:1;
    }

    .product-card{
      background:rgba(255,255,255,.97);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow-card);
      display:flex;
      flex-direction:column;
      transition:.25s ease;
      min-height:100%;
      border:1px solid rgba(36,79,130,.08);
      backdrop-filter: blur(6px);
    }

    .product-card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 32px rgba(24,39,75,.10);
    }

    .image-area{
      position:relative;
      aspect-ratio:1/1;
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(239,235,228,.98)),
        url("../imagenes/textura.jpg") center/cover no-repeat;
      overflow:hidden;
    }

    .tag{
      position:absolute;
      top:12px;
      left:12px;
      color:#fff;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      z-index:2;
      box-shadow:0 6px 12px rgba(0,0,0,.12);
    }

    .tag.disponible{
      background:rgba(17,17,17,.85);
    }

    .tag.agotado{
      background:#c0392b;
    }

    .image-area img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#eee;
      transition:transform .25s ease;
    }

    .product-card:hover .image-area img{
      transform:scale(1.02);
    }

    .image-placeholder{
      width:calc(100% - 20px);
      height:calc(100% - 20px);
      margin:10px;
      border-radius:16px;
      border:2px dashed rgba(0,0,0,.12);
      background:rgba(255,255,255,.35);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px;
    }

    .image-placeholder .icon{
      font-size:28px;
      margin-bottom:8px;
    }

    .image-placeholder p{
      color:#666;
      font-size:12px;
      line-height:1.4;
    }

    .product-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex-grow:1;
    }

    .product-title{
      font-size:18px;
      font-weight:800;
      color:#213348;
      line-height:1.2;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:44px;
    }

    .product-ref{
      color:var(--muted);
      font-size:13px;
    }

    .product-price{
      font-size:24px;
      font-weight:800;
      color:#1e2a36;
      line-height:1;
    }

    .product-desc{
      color:var(--muted-2);
      font-size:14px;
      line-height:1.55;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:62px;
    }

    .product-actions{
      margin-top:auto;
      display:grid;
      gap:8px;
      padding-top:6px;
    }

    .btn-product{
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      font-size:14px;
      transition:.2s ease;
    }

    .btn-whatsapp{
      background:#25D366;
      color:#fff;
      box-shadow:0 8px 16px rgba(37,211,102,.18);
    }

    .btn-whatsapp:hover{
      background:#1eb95a;
      transform:translateY(-1px);
    }

    .btn-whatsapp.disabled{
      background:#bdbdbd;
      pointer-events:none;
      cursor:not-allowed;
      box-shadow:none;
    }

    .load-more-wrap{
      display:flex;
      justify-content:center;
      margin-top:30px;
      position:relative;
      z-index:1;
    }

    .load-more-btn{
      border:none;
      background:
        linear-gradient(135deg, #1f7a5a 0%, #166247 45%, #244f82 100%);
      color:#fff;
      padding:16px 30px;
      border-radius:999px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:
        0 14px 28px rgba(31,122,90,.20),
        0 8px 18px rgba(36,79,130,.10);
      transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease;
      letter-spacing:.3px;
      position:relative;
      overflow:hidden;
    }

    .load-more-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,255,255,.00) 20%, rgba(255,255,255,.18) 50%, rgba(255,255,255,.00) 80%);
      transform:translateX(-120%);
      transition:transform .6s ease;
    }

    .load-more-btn:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:
        0 18px 34px rgba(31,122,90,.24),
        0 10px 22px rgba(36,79,130,.14);
    }

    .load-more-btn:hover::before{
      transform:translateX(120%);
    }

    .load-more-btn.hidden{
      display:none;
    }

    footer{
      margin-top:0;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(36,79,130,.08);
      font-size:13px;
      line-height:1.5;
      backdrop-filter: blur(8px);
      text-align:center;
      color:var(--muted);
      padding:22px;
      border-radius:0;
      width:100vw;
      margin-left:calc(50% - 50vw);
      margin-right:calc(50% - 50vw);
    }

    .whatsapp-float{
      position:fixed;
      left:16px;
      bottom:16px;
      z-index:999;
      width:64px;
      height:64px;
      border:none;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#4bdc65;
      box-shadow:
        0 10px 24px rgba(75,220,101,.28),
        0 6px 16px rgba(0,0,0,.10);
      text-decoration:none;
      transition:transform .22s ease, box-shadow .22s ease;
      padding:0;
    }

    .whatsapp-float:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:
        0 14px 30px rgba(75,220,101,.34),
        0 8px 18px rgba(0,0,0,.14);
    }

    .whatsapp-icon{
      width:100%;
      height:100%;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      margin:0;
      line-height:0;
    }

    .whatsapp-icon svg{
      width:32px;
      height:32px;
      display:block;
      fill:#fff;
    }

    @media (max-width:1199px){
      .catalog-hero h1{
        font-size:46px;
      }

      .products-grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:20px;
      }

      .toolbar{
        grid-template-columns:minmax(220px, 300px) 200px;
      }
    }

    @media (max-width:991px){
      .navbar{
        min-height:auto;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:8px;
        padding:12px 16px;
      }

      .nav-left{
        width:100%;
        justify-content:center;
      }

      .logo-box{
        width:135px;
        height:135px;
      }

      .nav-bottom{
        width:100%;
        justify-content:center;
      }

      .main-nav{
        width:100%;
        justify-content:center;
        gap:22px;
      }

      .catalog-hero{
        width:100%;
        margin-left:0;
        margin-right:0;
        min-height:280px;
      }

      .catalog-hero h1{
        font-size:40px;
      }

      .section-shell{
        width:100%;
        margin-left:0;
        margin-right:0;
        padding:24px;
      }

      .products-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:18px;
      }

      .toolbar{
        grid-template-columns:1fr 200px;
      }

      footer{
        width:100%;
        margin-left:0;
        margin-right:0;
      }
    }

    @media (max-width:640px){
      .container{
        padding:0 0 26px;
      }

      header{
        overflow:visible;
      }

      .navbar{
        min-height:128px;
        padding:12px 18px;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
      }

      .nav-left{
        width:100%;
        min-height:104px;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
      }

      .logo-box{
        width:138px;
        height:138px;
        margin:0 auto;
      }

      .menu-btn{
        display:flex;
        position:absolute;
        left:4px;
        top:50%;
        transform:translateY(-50%);
        width:48px;
        height:48px;
        border:none;
        border-radius:12px;
        background:transparent;
        font-size:36px;
        line-height:1;
        cursor:pointer;
        align-items:center;
        justify-content:center;
        z-index:60;
        color:#1f1f1f;
        padding:0;
      }

      .nav-bottom{
        display:none;
      }

      .mobile-overlay{
        display:block;
        position:fixed;
        inset:0;
        background:rgba(14,20,30,.42);
        opacity:0;
        visibility:hidden;
        pointer-events:none;
        transition:opacity .28s ease, visibility .28s ease;
        z-index:70;
      }

      .mobile-drawer{
        display:flex;
        flex-direction:column;
        position:fixed;
        top:0;
        left:0;
        width:min(82vw, 320px);
        height:100dvh;
        background:rgba(255,255,255,.98);
        backdrop-filter:blur(10px);
        box-shadow:18px 0 40px rgba(20,35,60,.18);
        transform:translateX(-105%);
        transition:transform .30s ease;
        z-index:80;
        padding:22px 18px 24px;
      }

      .mobile-drawer-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        margin-bottom:22px;
      }

      .mobile-drawer-logo{
        width:78px;
        height:78px;
        object-fit:contain;
        display:block;
      }

      .mobile-close{
        display:flex;
        width:42px;
        height:42px;
        border:none;
        border-radius:12px;
        background:#f3f4f6;
        color:#1f1f1f;
        font-size:26px;
        cursor:pointer;
        align-items:center;
        justify-content:center;
      }

      .mobile-drawer-nav{
        display:flex;
        flex-direction:column;
        gap:6px;
      }

      .mobile-drawer-nav a{
        text-decoration:none;
        color:var(--texto-fuerte);
        font-size:18px;
        font-weight:800;
        letter-spacing:.4px;
        padding:14px 12px;
        border-radius:14px;
        transition:.2s ease;
      }

      .mobile-drawer-nav a:hover,
      .mobile-drawer-nav a:active{
        background:rgba(47,120,189,.08);
        color:var(--azul-oscuro);
      }

      .menu-toggle:checked ~ .mobile-overlay{
        opacity:1;
        visibility:visible;
        pointer-events:auto;
      }

      .menu-toggle:checked ~ .mobile-drawer{
        transform:translateX(0);
      }

      .catalog-hero{
        min-height:230px;
        background-position:center;
      }

      .catalog-hero-inner{
        padding:26px 16px;
      }

      .catalog-pill{
        font-size:11px;
        padding:7px 12px;
        margin-bottom:14px;
      }

      .catalog-hero h1{
        font-size:32px;
        line-height:1;
      }

      .catalog-hero p{
        font-size:14px;
        line-height:1.55;
      }

      .section-shell{
        padding:20px 14px 24px;
        border-left:none;
        border-right:none;
      }

      .section-head{
        margin-bottom:16px;
      }

      .section-head-top{
        grid-template-columns:1fr auto;
        align-items:center;
      }

      .section-head h2{
        font-size:30px;
      }

      .product-counter{
        font-size:13px;
      }

      .filter-trigger{
        font-size:14px;
      }

            ${crearImagen(producto)}
          </div>

          <div class="product-body">
            <h4 class="product-title">${producto.nombre}</h4>
            <p class="product-ref">Ref: ${producto.referencia}</p>
            <div class="product-price">${formatoCOP(producto.precio)}</div>
            <p class="product-desc">${producto.descripcion}</p>

            <div class="product-actions">
              <a
                class="btn-product btn-whatsapp ${disponible ? '' : 'disabled'}"
                href="${disponible ? `https://wa.me/${whatsappNumber}?text=${mensaje}` : '#'}"
                target="_blank"
              >
                ${disponible ? 'Pedir por WhatsApp' : 'No disponible'}
              </a>
            </div>
          </div>
        </article>
      `;
    }

    function actualizarBotonVerMas() {
      if (visibleCount >= filteredProducts.length) {
        loadMoreBtn.classList.add('hidden');
      } else {
        loadMoreBtn.classList.remove('hidden');
      }
    }

    function renderProductos(lista) {
      filteredProducts = lista;
      const visibles = filteredProducts.slice(0, visibleCount);
      productGrid.innerHTML = visibles.map(crearTarjeta).join('');
      productCount.textContent = filteredProducts.length;
      actualizarBotonVerMas();
    }

    function aplicarFiltros(resetVisible = true) {
      const termino = searchInputPanel.value.toLowerCase().trim();
      const orden = sortSelectPanel.value;

      let filtrados = productos.filter(p =>
        `${p.nombre} ${p.referencia}`.toLowerCase().includes(termino)
      );

      if (orden === 'name') {
        filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));
      }

      if (resetVisible) {
        visibleCount = INITIAL_VISIBLE;
      }

      renderProductos(filtrados);
    }

    function setFilterPanelState(show) {
      if (!filterPanelWrap || !filterTrigger) return;
      filterPanelWrap.classList.toggle('hidden', !show);
      filterTrigger.setAttribute('aria-expanded', show ? 'true' : 'false');
    }

    loadMoreBtn.addEventListener('click', () => {
      visibleCount += LOAD_MORE_STEP;
      renderProductos(filteredProducts);
    });

    searchInputPanel.addEventListener('input', () => {
      aplicarFiltros(true);
    });

    sortSelectPanel.addEventListener('change', () => {
      aplicarFiltros(true);
    });

    if (filterTrigger && filterPanelWrap) {
      filterTrigger.addEventListener('click', () => {
        const isHidden = filterPanelWrap.classList.contains('hidden');
        setFilterPanelState(isHidden);
      });
    }

    window.addEventListener('resize', () => {
      aplicarFiltros(false);
    });

    setFilterPanelState(false);
    aplicarFiltros(true);

    const mobileLinks = document.querySelectorAll('.mobile-drawer-nav a');
    const menuToggle = document.getElementById('menu-toggle');

    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        menuToggle.checked = false;
      });
    });
  </script>
</body>
</html>
